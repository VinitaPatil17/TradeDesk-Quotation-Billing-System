<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register</title>
<link rel="stylesheet" href="/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body class="auth-body">

<div class="login-container">

<div class="premium-header">
    <h2>Create Account</h2>
    <p class="sub-text">Register your business</p>
</div>

<input type="text" placeholder="Company Name" class="input-field" id="company">

<input type="text" placeholder="GST Number" class="input-field" id="gst">

<input type="text" placeholder="Phone Number" class="input-field" id="phone">

<input type="email" placeholder="Email Address" class="input-field" id="email">

<input type="password" placeholder="Password" class="input-field" id="password">

<button class="primary-btn" onclick="register()">Register</button>

<div class="auth-link">
    Already have an account? <a href="/login.html">Login</a>
</div>

</div>
<script src="/js/script.js"></script>

</body>
</html>
